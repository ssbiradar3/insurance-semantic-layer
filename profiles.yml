# Local DuckDB profile. No warehouse account needed.
# To target Snowflake later, add a 'snowflake' output block and switch target.
insurance_semantic_layer:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "dev.duckdb"
      threads: 4

