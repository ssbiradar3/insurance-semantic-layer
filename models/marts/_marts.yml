version: 2

models:
  - name: dim_policy
    columns:
      - name: policy_id
        tests: [unique, not_null]

  - name: dim_location
    description: "Exposure dimension after the vendor flood join."
    columns:
      - name: location_id
        tests: [unique, not_null]
      - name: flood_zone
        description: "From the vendor feed; UNKNOWN if the feed had no match."
        tests:
          - accepted_values:
              values: ['X', 'A', 'AE', 'VE', 'UNKNOWN']

  - name: fct_premium
    description: "One row per policy with written and earned premium."
    tests:
      - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
          column_A: written_premium
          column_B: earned_premium
          or_equal: true
      # Volume monitor: alerts if the table size falls outside an expected band
      # (a pipeline that drops or fans out rows). The native equivalent of an
      # Elementary volume-anomaly test, runnable on DuckDB.
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 500
          max_value: 5000000
    columns:
      - name: policy_id
        tests: [unique, not_null]
      - name: earned_premium
        tests: [not_null]
      - name: underwriting_expense
        tests: [not_null]
      - name: loaded_at
        description: "Ingestion-batch watermark used by the incremental build."
        tests: [not_null]

  - name: fct_claim
    description: "One row per claim, enriched with policy attributes."
    tests:
      # Volume monitor for the claims fact (see fct_premium for rationale).
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 100
          max_value: 5000000
    columns:
      - name: claim_id
        tests: [unique, not_null]
      - name: policy_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_policy')
              field: policy_id
      - name: incurred_loss
        tests: [not_null]
      - name: loaded_at
        description: "Ingestion-batch watermark used by the incremental build."
        tests: [not_null]
