metrics:
  # ---- simple metrics (one measure each) ----
  - name: written_premium
    description: "Total written premium."
    type: simple
    label: "Written Premium"
    type_params:
      measure: written_premium_amount

  - name: earned_premium
    description: "Total earned premium."
    type: simple
    label: "Earned Premium"
    type_params:
      measure: earned_premium_amount

  - name: incurred_loss
    description: "Total incurred loss (paid + reserve)."
    type: simple
    label: "Incurred Loss"
    type_params:
      measure: incurred_loss_amount

  - name: claim_count
    description: "Number of claims."
    type: simple
    label: "Claim Count"
    type_params:
      measure: claim_count

  - name: policy_count
    description: "Number of policies."
    type: simple
    label: "Policy Count"
    type_params:
      measure: policy_count

  - name: underwriting_expense
    description: "Total underwriting expense (commission + general expense)."
    type: simple
    label: "Underwriting Expense"
    type_params:
      measure: underwriting_expense_amount

  # ---- ratio metrics (the governed KPIs stakeholders self-serve) ----
  - name: loss_ratio
    description: "Incurred loss divided by earned premium. The headline KPI."
    type: ratio
    label: "Loss Ratio"
    type_params:
      numerator: incurred_loss
      denominator: earned_premium

  - name: claim_frequency
    description: "Claims per policy."
    type: ratio
    label: "Claim Frequency"
    type_params:
      numerator: claim_count
      denominator: policy_count

  - name: claim_severity
    description: "Average incurred loss per claim."
    type: ratio
    label: "Claim Severity"
    type_params:
      numerator: incurred_loss
      denominator: claim_count

  - name: expense_ratio
    description: "Underwriting expense divided by written premium (trade basis)."
    type: ratio
    label: "Expense Ratio"
    type_params:
      numerator: underwriting_expense
      denominator: written_premium

  # ---- derived metric (combines other governed metrics) ----
  - name: combined_ratio
    description: >-
      Loss ratio plus expense ratio. The headline underwriting-profitability KPI:
      below 1.0 means the book made an underwriting profit, above 1.0 a loss.
    type: derived
    label: "Combined Ratio"
    type_params:
      expr: loss_ratio + expense_ratio
      metrics:
        - name: loss_ratio
        - name: expense_ratio
