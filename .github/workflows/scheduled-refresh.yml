name: scheduled-refresh

# Demonstrates the data-refresh path on a schedule: do the initial load, then
# simulate the next ingestion batch and let the INCREMENTAL facts process only
# the new rows — and prove the reconciliation gate stays green after the refresh.
# Runs daily and on demand. (In a real deployment this would build the prod
# warehouse with `--target prod` instead of the local DuckDB demo.)
on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt + MetricFlow
        run: pip install dbt-duckdb dbt-metricflow

      - name: Install dbt packages
        run: dbt deps

      - name: Initial load + full build
        run: |
          python scripts/generate_data.py
          dbt build
          echo "Rows after initial load:"
          python scripts/row_counts.py

      - name: Simulate the next daily ingestion batch
        run: python scripts/simulate_refresh.py

      - name: Incremental refresh + full reconciliation gate
        run: |
          bash scripts/validate.sh
          echo "Rows after incremental refresh (only the new batch was processed):"
          python scripts/row_counts.py
